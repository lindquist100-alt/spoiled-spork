<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julian — Hyper Modern Motion Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* Scroll snapping */
    html {
      scroll-snap-type: y mandatory;
    }

    section {
      min-height: 100vh;
      padding: 120px 10%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      scroll-snap-align: start;
      position: relative;
    }

    /* Glowing trim */
    section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 80%;
      height: 2px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(255,255,255,0.9), transparent);
      filter: blur(8px);
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      padding: 15px 30px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      justify-content: space-between;
      z-index: 999;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-size: 1.1rem;
      opacity: 0.8;
      transition: 0.3s;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    /* Hero */
    .hero {
      text-align: center;
    }

    .hero-title {
      font-size: 6rem;
      font-weight: 700;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    .hero-sub {
      font-size: 1.5rem;
      opacity: 0.7;
    }

    /* Pinned text */
    .pinned-text {
      font-size: 3rem;
      text-align: center;
      opacity: 0;
      transform: translateY(40px);
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    /* Product showcase */
    .product-showcase {
      position: relative;
      height: 250vh;
    }

    .product-image {
      position: sticky;
      top: 20%;
      width: 50%;
      margin: 0 auto;
      display: block;
      transform: scale(1) rotate(0deg);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255,255,255,0.25);
    }

    .product-caption {
      opacity: 0;
      transform: translateY(40px);
      margin-top: 40vh;
      text-align: center;
      font-size: 2rem;
    }

    /* Multi-image gallery */
    .gallery {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .gallery img {
      width: 300px;
      border-radius: 20px;
      opacity: 0;
      transform: translateY(40px);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    /* Parallax */
    .parallax {
      position: relative;
      height: 150vh;
      overflow: hidden;
    }

    .parallax-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      object-fit: cover;
      transform: translateY(0px);
      opacity: 0.4;
    }

    .parallax-text {
      position: relative;
      margin-top: 40vh;
      text-align: center;
      font-size: 3rem;
      opacity: 0;
      transform: translateY(40px);
    }

    .contact {
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">Julian</div>
    <div class="nav-links">
      <a href="#hero">Home</a>
      <a href="#product">Product</a>
      <a href="#gallery">Gallery</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <!-- HERO -->
  <section id="hero" class="hero">
    <h1 class="hero-title">Julian</h1>
    <p class="hero-sub">Creative Developer • Motion Designer</p>
  </section>

  <!-- PINNED TEXT -->
  <section>
    <div class="pinned-text">
      Smooth. Cinematic. Apple‑level storytelling.
    </div>
  </section>

  <!-- PRODUCT SCROLL -->
  <section id="product" class="product-showcase">
    <img src="Screenshot 2025-10-06 213916.png" class="product-image">

    <div class="product-caption">
      Precision motion. Scroll‑controlled animation.
    </div>
  </section>

  <!-- MULTI IMAGE GALLERY -->
  <section id="gallery">
    <h2 style="text-align:center; font-size:3rem;">Gallery</h2>
    <div class="gallery">
      <img src="Screenshot 2025-10-06 213916.png">
      <img src="Screenshot 2025-10-06 213916.png">
      <img src="Screenshot 2025-10-06 213916.png">
    </div>
  </section>

  <!-- PARALLAX -->
  <section class="parallax">
    <img src="Screenshot 2025-10-06 213916.png" class="parallax-bg">
    <div class="parallax-text">
      Depth. Motion. Immersion.
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="contact">
    <h2>Let’s Build Something</h2>
    <p>julian@example.com</p>
  </section>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    gsap.from(".hero-title", {
      scale: 0.9,
      opacity: 0,
      duration: 1.5,
      ease: "power2.out"
    });

    gsap.to(".pinned-text", {
      opacity: 1,
      y: 0,
      scrollTrigger: {
        trigger: ".pinned-text",
        start: "top 80%",
        scrub: true,
        pin: true,
        pinSpacing: true
      }
    });

    gsap.to(".product-image", {
      scale: 1.6,
      rotate: 25,
      ease: "none",
      scrollTrigger: {
        trigger: ".product-showcase",
        start: "top top",
        end: "bottom bottom",
        scrub: true
      }
    });

    gsap.to(".product-caption", {
      opacity: 1,
      y: 0,
      duration: 1.2,
      scrollTrigger: {
        trigger: ".product-caption",
        start: "top 80%",
        scrub: true
      }
    });

    gsap.utils.toArray(".gallery img").forEach(img => {
      gsap.to(img, {
        opacity: 1,
        y: 0,
        duration: 1.2,
        scrollTrigger: {
          trigger: img,
          start: "top 85%",
          scrub: true
        }
      });
    });

    gsap.to(".parallax-bg", {
      y: -200,
      ease: "none",
      scrollTrigger: {
        trigger: ".parallax",
        start: "top top",
        end: "bottom bottom",
        scrub: true
      }
    });

    gsap.to(".parallax-text", {
      opacity: 1,
      y: 0,
      duration: 1.2,
      scrollTrigger: {
        trigger: ".parallax-text",
        start: "top 80%",
        scrub: true
      }
    });
  </script>

</body>
</html>
